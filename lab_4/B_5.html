<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = (prompt("Enter the number : "));

        first = parseInt(num.charAt(0));
        second = parseInt(num.charAt(1));

        multi = 1;

    for(i = 1 ; i <= second ; i++)
    {
        multi *= first; 
    }

    alert(multi);
    </script>
</body>
</html>
