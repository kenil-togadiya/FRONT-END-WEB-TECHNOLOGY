<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let string = prompt("Enter the string : ");

        first = string.indexOf('a');
        last_index = string.lastIndexOf('a');
        str = string.substring(first + 1,last_index);

        document.write(first + " ");
        document.write(last_index + " " + "<br/>");
        document.write(str);
    </script>
</body>
</html>
