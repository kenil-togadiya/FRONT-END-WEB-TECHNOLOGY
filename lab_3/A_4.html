<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = parseFloat(prompt("Enter the number : "));

        a = 0 , b = 1,sum = 0;

    for(i = 1 ; i <= num ; i++)
    {
        document.write(" " + a);
        sum = a + b;
        a = b;
        b = sum;
    }
    </script>
</body>
</html>
