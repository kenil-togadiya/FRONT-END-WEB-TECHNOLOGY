<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = parseFloat(prompt("Enter the number : "));

        temp = num;
        rev = 0;
        while(num > 0)
    {
        rem = num % 10;
        rev = rev * 10 + rem;
        num = parseInt(num / 10);
    }

    if(rev == temp)
    {
        alert(" " + " number is palindrome");
    }
    else
    {
        alert(" " + " number not palindrome");
    }

    </script>
</body>
</html>
