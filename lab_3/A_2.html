<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = parseFloat(prompt("Enter the number : "));

        isdivisible = false;

    if(num <= 1)
    {
        document.write("Number is Invalid");
    }
    else
    {
        for(i = 2 ; i < Math.sqrt(num) ; i++)
        {
            if(num % i == 0)
            {
                isdivisible = true;
                break;
            }
        }
    }
    if(!isdivisible)
    {
        alert(num + " is prime");
    }
    else
    {
        alert(num + " is not prime");
    }
    </script>
</body>
</html>
