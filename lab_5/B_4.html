<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function quickSort(arr) {

            if (arr.length <= 1) {
                return arr;
            }

            let pivot = arr[arr.length - 1];

            let left = [];
            let right = [];

            for (i = 0; i < arr.length - 1; i++) {
                if (arr[i] < pivot) {
                    left.push(arr[i]);
                }
                else {
                    right.push(arr[i]);
                }
            }

            let mergeArray = [];

            let sortLeft = quickSort(left);
            let sortRight = quickSort(right);

            for (i = 0; i < sortLeft.length; i++) {
                mergeArray.push(sortLeft[i]);
            }

            mergeArray.push(pivot)

            for (i = 0; i < sortRight.length; i++) {
                mergeArray.push(sortRight[i]);
            }

            return mergeArray
        }
        
        let arr = [2, 5, 3, 10, 9, 8]

        result = quickSort(arr)

        document.write(result)

    </script>
</body>

</html>
