<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenil patel</title>
</head>

<body>
    <script>
        num = prompt("Enter the size of arr : ");

        arr = new Array[num];

        for (i = 0; i < num; i++) {
            arr[i] = prompt("Enter the Element : ");
        }
        
        max = arr[0];

        for (i = 0; i < arr.length; i++) {
            if (max < arr[i]) {
                max = arr[i];
            }
        }

        document.write("Maximum number : " + max);

    </script>
</body>

</html>
