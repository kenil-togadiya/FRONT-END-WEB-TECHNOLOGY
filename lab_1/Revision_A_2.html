<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .paragraph
        {
            margin-top: 150px;
            margin-left: 30px;
            font-size: 30px;

        }
        .para::first-line
        {
            font-size: 40px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: goldenrod;
        }
        .para::first-letter
        {
            color: seagreen;
            font-size: 50px;
        }
        .para::selection
        {
            background-color: yellow;
        }
        .para:hover
        {
            font-style: italic;
        }
    </style>
</head>
<body>
        <div class="paragraph">
        <div class="para">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            <br> Sint qui asperiores quod, voluptatibus omnis id unde recusandae, impedit
            <br>laboriosam totam reiciendis officiis eos et praesentium, earum atque quas voluptates.
            <br> Animi?
        </div>
    </div>
</body>
</html>
