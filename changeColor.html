<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        #changeCol {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div id="changeCol"></div>
    <script>
        let objectColor = document.getElementById("changeCol");
        
        let colors = ['white','orange','blue','pink'];
        let nextcolor = 0;
        
        setInterval(()=>{objectColor.style.backgroundColor = colors[nextcolor % colors.length];
            nextcolor++;
    },500);
        
        </script>
        </body>
</html>
